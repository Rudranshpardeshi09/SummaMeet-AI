# Alembic configuration for async SQLAlchemy migrations

[alembic]
script_location = db/alembic
prepend_sys_path = apps/api
sqlalchemy.url = postgresql+asyncpg://notetaker:notetaker_dev_password@localhost:5434/ai_note_taker

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
